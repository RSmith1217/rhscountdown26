name: Update RHS Absences

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 10-16 * * 1-5"

permissions:
  contents: write

jobs:
  update-absences:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Scrape RHS App absences
        run: python scripts/update_absences.py

      - name: Commit updated absence data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add absences.json
          git diff --cached --quiet || git commit -m "Update absence data"
          git push
